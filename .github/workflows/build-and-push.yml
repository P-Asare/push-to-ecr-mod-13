name: Build and Push to Amazon ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPO }}
  FULL_NAME: ${{ vars.FULL_NAME }}
  APP_NAME: ${{ vars.APP_NAME }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Prepare Image Information
        shell: bash
        run: |
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)

          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          IMAGE_TAG="${{ env.FULL_NAME }}_${{ env.APP_NAME }}"

          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"

      - name: Build Docker Image
        run: |
          docker build \
            -t $IMAGE_URI:$IMAGE_TAG \
            -t $IMAGE_URI:$SHORT_SHA \
            .

      - name: Push Docker Image
        run: |
          docker push $IMAGE_URI:$IMAGE_TAG
          docker push $IMAGE_URI:$SHORT_SHA
