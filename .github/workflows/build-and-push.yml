name: Build and Push to Amazon ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPO: ${{ vars.ECR_REPO }}
  DOCKER_BUILD_SUMMARY: false
  DOCKER_BUILD_RECORD_UPLOAD: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Required Inputs
        shell: bash
        run: |
          errors=0

          if [ -z "$AWS_REGION" ]; then
            echo "::error::AWS_REGION variable is not configured."
            errors=1
          fi

          if [ -z "$ECR_REPO" ]; then
            echo "::error::ECR_REPO variable is not configured."
            errors=1
          fi

          if [ -z "${{ secrets.AWS_ROLE_ARN }}" ]; then
            echo "::error::AWS_ROLE_ARN secret is not configured."
            errors=1
          fi

          if [ $errors -ne 0 ]; then
            exit 1
          fi

      - name: Debug GitHub Context
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "Actor: ${{ github.actor }}"

      - name: Verify Role ARN
        run: |
          ROLE="${{ secrets.AWS_ROLE_ARN }}"
          echo "Role ARN length: ${#ROLE}"
          echo "Role name: ${ROLE##*/}" 

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Image Tags
        id: meta
        shell: bash
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)

          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

          echo "image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}" >> "$GITHUB_OUTPUT"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false

          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short_sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Wait for Image Scan
        shell: bash
        run: |
          echo "Waiting for ECR image scan..."

          aws ecr wait image-scan-complete \
            --repository-name "$ECR_REPO" \
            --image-id imageTag=${{ steps.meta.outputs.short_sha }} \
            --region "$AWS_REGION"

      - name: Check Scan Results
        shell: bash
        run: |
          FINDINGS=$(aws ecr describe-image-scan-findings \
            --repository-name "$ECR_REPO" \
            --image-id imageTag=${{ steps.meta.outputs.short_sha }} \
            --region "$AWS_REGION" \
            --query 'length(imageScanFindings.findings[?severity==`CRITICAL` || severity==`HIGH`])' \
            --output text)

          if [ "$FINDINGS" -gt 0 ]; then
            echo "::error::Found $FINDINGS HIGH/CRITICAL vulnerabilities."
            exit 1
          fi

          echo "No HIGH or CRITICAL vulnerabilities detected."
